<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uygulama Gizlilik Politikaları</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      line-height: 1.6;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      color: #fff;
      padding: 56px 24px 44px;
      text-align: center;
    }
    header h1 { font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 700; }
    header p { margin-top: 10px; opacity: 0.7; font-size: 0.95rem; }
    .btn-new {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      background: #fff;
      color: #0f3460;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 12px 24px;
      border-radius: 30px;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-new:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.25); }
    main { max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; }
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 16px;
    }
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .app-card {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .app-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.1); transform: translateY(-2px); }
    .app-card-header { display: flex; align-items: center; gap: 14px; }
    .app-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, #0f3460, #1a6bb5);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .app-name { font-weight: 700; font-size: 0.98rem; color: #1a1a2e; }
    .app-id { font-size: 0.76rem; color: #999; margin-top: 2px; font-family: monospace; }
    .app-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 20px;
      background: #eef2ff;
      color: #3a56a0;
      font-weight: 600;
    }
    .app-links { display: flex; gap: 10px; margin-top: 4px; }
    .link-btn {
      flex: 1;
      text-align: center;
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .link-btn:hover { opacity: 0.85; }
    .link-policy { background: #0f3460; color: #fff; }
    .link-store { background: #f0f4ff; color: #0f3460; }
    footer { text-align: center; padding: 32px 24px; font-size: 0.83rem; color: #aaa; }
  </style>
</head>
<body>

<header>
  <h1>Gizlilik Politikaları</h1>
  <p>Tüm uygulamalarımızın gizlilik politikalarına buradan ulaşabilirsiniz.</p>
  <a href="/generator/" class="btn-new">+ Yeni Politika Oluştur</a>
</header>

<main>
  <p class="section-title">Yayınlanan Uygulamalar</p>
  <div class="app-grid">

    <div class="app-card">
      <div class="app-card-header">
        <div class="app-icon">🛡️</div>
        <div>
          <div class="app-name">Özel Güvenlik Sınav Soruları</div>
          <div class="app-id">ozel.guvenlik.sinav.sorulari</div>
        </div>
      </div>
      <div class="app-tags">
        <span class="tag">AdMob</span>
        <span class="tag">OneSignal</span>
        <span class="tag">Premium</span>
      </div>
      <div class="app-links">
        <a href="/ozel-guvenlik-sinav-sorulari/" class="link-btn link-policy">Gizlilik Politikası</a>
        <a href="https://play.google.com/store/apps/details?id=ozel.guvenlik.sinav.sorulari.ozel_guvenlik_sinav_sorulari&hl=tr"
           target="_blank" rel="noopener" class="link-btn link-store">Play Store</a>
      </div>
    </div>

    <!-- Yeni uygulamalar buraya eklenecek -->

  </div>
</main>

<footer>
  <p>© 2026 · <a href="mailto:avsenatercan@gmail.com" style="color:#0f3460;">avsenatercan@gmail.com</a></p>
</footer>

</body>
</html>
