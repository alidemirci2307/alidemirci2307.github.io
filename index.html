<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Gizlilik Politikaları</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#0f3460;--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--muted:#64748b;--radius:16px}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:#1e293b;line-height:1.6;overflow-x:hidden;transition:background .3s,color .3s}
    body.dark{background:#0f172a;color:#f1f5f9;--bg:#0f172a;--surface:#1e293b;--border:#334155;--muted:#94a3b8}
    body.dark .hero{background:linear-gradient(135deg,#0a1628 0%,#0f172a 45%,#1a0a2e 100%)}
    body.dark .app-card{background:#1e293b;border-color:#334155}
    body.dark .filter-tab{background:#1e293b;border-color:#334155;color:#94a3b8}
    body.dark .tag{background:#334155;color:#94a3b8}
    body.dark footer{border-color:#334155}

    /* Hero */
    .hero{background:linear-gradient(135deg,#0f3460 0%,#16213e 45%,#1a0a2e 100%);color:#fff;padding:80px 24px 72px;text-align:center;position:relative;overflow:hidden}
    .hero-bg{position:absolute;inset:0;pointer-events:none}
    .hero-bg span{position:absolute;border-radius:50%;opacity:.08;animation:float 10s ease-in-out infinite}
    .hero-bg span:nth-child(1){width:400px;height:400px;background:#3b82f6;top:-150px;left:-100px}
    .hero-bg span:nth-child(2){width:250px;height:250px;background:#8b5cf6;top:50px;right:-80px;animation-delay:-4s}
    .hero-bg span:nth-child(3){width:180px;height:180px;background:#ec4899;bottom:-60px;left:50%;animation-delay:-7s}
    @keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-25px) rotate(5deg)}}
    .hero-content{position:relative;z-index:1}
    .hero h1{font-size:clamp(2rem,5vw,3.2rem);font-weight:800;letter-spacing:-1.5px}
    .hero-sub{margin-top:12px;font-size:1.05rem;opacity:.7}
    .hero-cta{display:inline-flex;align-items:center;gap:8px;margin-top:32px;background:#fff;color:var(--primary);font-weight:700;font-size:.9rem;padding:13px 26px;border-radius:30px;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:transform .2s,box-shadow .2s}
    .hero-cta:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.3);text-decoration:none}
    .hero-stats{display:flex;align-items:center;justify-content:center;gap:32px;margin-top:40px;flex-wrap:wrap}
    .stat{text-align:center}
    .stat-num{font-size:2rem;font-weight:800;line-height:1}
    .stat-label{font-size:.75rem;opacity:.6;margin-top:4px;text-transform:uppercase;letter-spacing:.8px}

    /* Main */
    main{max-width:960px;margin:0 auto;padding:56px 24px 80px}
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .section-label{font-size:.72rem;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}
    .filter-tabs{display:flex;gap:6px}
    .filter-tab{padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .2s}
    .filter-tab.active,.filter-tab:hover{background:var(--primary);color:#fff;border-color:var(--primary)}

    /* Grid */
    .app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}

    /* Card */
    .app-card{background:var(--surface);border-radius:20px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.06);opacity:0;transform:translateY(20px);transition:opacity .4s ease,transform .4s ease,box-shadow .25s}
    .app-card.visible{opacity:1;transform:translateY(0)}
    .app-card:hover{box-shadow:0 12px 40px rgba(0,0,0,.12);transform:translateY(-4px) !important}
    body.dark .app-card:hover{box-shadow:0 12px 40px rgba(0,0,0,.35)}

    /* Accent bar */
    .card-accent{height:4px;background:linear-gradient(90deg,#3b82f6,#8b5cf6)}
    .card-accent.ios{background:linear-gradient(90deg,#06b6d4,#0ea5e9)}
    .card-accent.both{background:linear-gradient(90deg,#3b82f6,#ec4899)}

    /* Body */
    .card-body{padding:20px 20px 16px}

    /* Header row */
    .card-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
    .app-icon{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,#0f3460,#1a6bb5);display:flex;align-items:center;justify-content:center;font-size:1.55rem;flex-shrink:0;box-shadow:0 4px 14px rgba(15,52,96,.25)}
    .app-info{flex:1;min-width:0}
    .app-name{font-weight:700;font-size:.97rem;color:var(--text);line-height:1.3;margin-bottom:3px}
    .app-pkg{font-size:.68rem;color:var(--muted);font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

    /* Meta row: platform + tags */
    .card-meta{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-bottom:16px}
    .plat-chip{font-size:.68rem;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.2px}
    .plat-chip.android{background:#dcfce7;color:#15803d}
    .plat-chip.ios{background:#dbeafe;color:#1d4ed8}
    body.dark .plat-chip.android{background:#14532d40;color:#4ade80}
    body.dark .plat-chip.ios{background:#1e3a5f40;color:#93c5fd}
    .tag{font-size:.67rem;padding:3px 9px;border-radius:20px;background:#f1f5f9;color:#475569;font-weight:600}
    body.dark .tag{background:#334155;color:#94a3b8}
    .tag-more{font-size:.67rem;padding:3px 9px;border-radius:20px;background:transparent;color:var(--muted);font-weight:600;border:1px dashed var(--border)}

    /* Footer buttons */
    .card-footer{padding-top:14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
    .btn-policy{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 14px;border-radius:11px;background:linear-gradient(135deg,#0f3460,#1a4fa0);color:#fff;font-size:.82rem;font-weight:700;text-decoration:none;transition:all .2s;white-space:nowrap}
    .btn-policy:hover{opacity:.88;transform:translateY(-1px);text-decoration:none}
    .btn-policy svg{flex-shrink:0}
    .btn-store{width:40px;height:40px;border-radius:11px;background:var(--bg);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;text-decoration:none;color:var(--muted);flex-shrink:0;transition:all .2s}
    .btn-store:hover{border-color:var(--primary);color:var(--primary);background:var(--surface);transform:translateY(-1px);text-decoration:none}

    /* Empty state */
    .empty{grid-column:1/-1;text-align:center;padding:64px 0;color:var(--muted)}
    .empty-icon{font-size:3rem;margin-bottom:12px;opacity:.4}

    .topnav{background:linear-gradient(135deg,#0f3460 0%,#16213e 100%);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
    .topnav-links{display:flex;align-items:center;gap:8px}
    .topnav-link{color:rgba(255,255,255,.7);text-decoration:none;font-size:.78rem;font-weight:500;padding:5px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.15);transition:all .2s}
    .topnav-link:hover{background:rgba(255,255,255,.12);color:#fff}
    .dark-toggle{background:transparent;border:1.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.75);width:30px;height:30px;border-radius:50%;font-size:.9rem;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .2s}
    .dark-toggle:hover{background:rgba(255,255,255,.15);color:#fff}
    footer{text-align:center;padding:32px 24px;font-size:.82rem;color:var(--muted);border-top:1px solid var(--border)}
    footer a{color:var(--primary)}

    @media(max-width:600px){.hero-stats{gap:20px}.stat-num{font-size:1.5rem}}
  </style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-links">
    <a href="/delete-request/" class="topnav-link">🗑 Veri Silme Talebi</a>
    <a href="/qr/" class="topnav-link">📲 QR Kodlar</a>
  </div>
  <button class="dark-toggle" id="dark-toggle" onclick="toggleDark()" title="Dark mode">🌙</button>
</nav>

<div class="hero">
  <div class="hero-bg"><span></span><span></span><span></span></div>
  <div class="hero-content">
    <h1 id="h1">Gizlilik Politikaları</h1>
    <p class="hero-sub" id="hs">Tüm uygulamalarımızın gizlilik politikalarına tek yerden erişin.</p>
    <a href="/generator/" class="hero-cta" id="cta">+ Yeni Politika Oluştur</a>
    <div class="hero-stats" id="stats">
      <div class="stat"><div class="stat-num" id="stat-apps">—</div><div class="stat-label">Uygulama</div></div>
      <div class="stat"><div class="stat-num" id="stat-plat">—</div><div class="stat-label">Platform</div></div>
      <div class="stat"><div class="stat-num" id="stat-svc">—</div><div class="stat-label">Entegrasyon</div></div>
    </div>
  </div>
</div>

<main>
  <div class="section-header">
    <span class="section-label" id="count-label">Yükleniyor…</span>
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">Tümü</button>
      <button class="filter-tab" data-filter="android">Android</button>
      <button class="filter-tab" data-filter="ios">iOS</button>
    </div>
  </div>
  <div class="app-grid" id="grid">
    <div class="empty"><div class="empty-icon">⏳</div><p>Yükleniyor…</p></div>
  </div>
</main>

<footer>
  <p>© <span id="yr"></span> · <a href="mailto:alidemirci2307@gmail.com">alidemirci2307@gmail.com</a> · <a href="/generator/">Yeni Politika Oluştur</a></p>
</footer>

<script>
document.getElementById('yr').textContent = new Date().getFullYear();

function toggleDark() {
  var isDark = document.body.classList.toggle('dark');
  localStorage.setItem('pp_dark', isDark ? '1' : '0');
  document.getElementById('dark-toggle').textContent = isDark ? '☀️' : '🌙';
}
(function(){
  var saved = localStorage.getItem('pp_dark');
  if (saved === '1' || (saved === null && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.body.classList.add('dark');
    var btn = document.getElementById('dark-toggle');
    if (btn) btn.textContent = '☀️';
  }
})();
gsap.from('#h1',{duration:.8,y:30,opacity:0,ease:'power3.out',delay:.1});
gsap.from('#hs', {duration:.8,y:20,opacity:0,ease:'power3.out',delay:.3});
gsap.from('#cta',{duration:.8,y:15,opacity:0,ease:'power3.out',delay:.5});
gsap.from('#stats',{duration:.8,y:15,opacity:0,ease:'power3.out',delay:.65});

const SVC = {admob:'AdMob',onesignal:'OneSignal',firebase_analytics:'Firebase',firebase_crashlytics:'Crashlytics',amplitude:'Amplitude',mixpanel:'Mixpanel',sentry:'Sentry',adjust:'Adjust',appsflyer:'AppsFlyer',play_billing:'Play Billing',apple_iap:'App Store IAP',revenuecat:'RevenueCat',google_maps:'Maps',supabase:'Supabase',fcm:'FCM',firebase_auth:'Firebase Auth',google_signin:'Google Login',apple_signin:'Apple Login',facebook_login:'FB Login',facebook_audience:'FB Audience',unity_ads:'Unity Ads',applovin:'AppLovin',ironsource:'ironSource'};

let allApps = [];
let currentFilter = 'all';

function renderGrid(apps){
  const grid = document.getElementById('grid');
  const filtered = currentFilter==='all' ? apps : apps.filter(a=>a.platform===currentFilter||a.platform==='both');
  if(!filtered.length){
    grid.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>Bu platformda uygulama yok.</p></div>';
    return;
  }
  grid.innerHTML = filtered.map((app,i)=>{
    const allTags = Object.entries(app.services||{}).filter(([,v])=>v).map(([k])=>SVC[k]||k);
    const MAX_TAGS = 4;
    const shownTags = allTags.slice(0,MAX_TAGS).map(t=>'<span class="tag">'+t+'</span>').join('');
    const moreBadge = allTags.length>MAX_TAGS ? '<span class="tag-more">+' +(allTags.length-MAX_TAGS)+ '</span>' : '';

    const platChips = app.platform==='both'
      ? '<span class="plat-chip android">Android</span><span class="plat-chip ios">iOS</span>'
      : app.platform==='ios'
        ? '<span class="plat-chip ios">iOS</span>'
        : '<span class="plat-chip android">Android</span>';

    const accentClass = app.platform==='ios'?'ios':app.platform==='both'?'both':'';
    const storeUrl = app.playUrl||app.appStoreUrl||'';
    const storeIcon = app.platform==='ios' ? '🍎' : '▶';
    const storeBtn = storeUrl
      ? '<a href="'+storeUrl+'" target="_blank" rel="noopener" class="btn-store" title="Mağazada Aç">'+storeIcon+'</a>' : '';

    return '<div class="app-card" style="transition-delay:'+(i*0.06)+'s">'
      +'<div class="card-accent '+accentClass+'"></div>'
      +'<div class="card-body">'
      +'<div class="card-header">'
      +'<div class="app-icon">'+(app.icon||'📱')+'</div>'
      +'<div class="app-info">'
      +'<div class="app-name">'+app.name+'</div>'
      +(app.packageId?'<div class="app-pkg">'+app.packageId+'</div>':'')
      +'</div>'
      +'</div>'
      +'<div class="card-meta">'+platChips+shownTags+moreBadge+'</div>'
      +'<div class="card-footer">'
      +'<a href="/'+app.slug+'/" class="btn-policy">'
      +'<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>'
      +'Gizlilik Politikası'
      +'</a>'
      +storeBtn
      +'</div>'
      +'</div></div>';
  }).join('');
  // Trigger reveal
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});
  },{threshold:.08});
  grid.querySelectorAll('.app-card').forEach(c=>obs.observe(c));
  document.getElementById('count-label').textContent = filtered.length+' Uygulama';
}

document.querySelectorAll('.filter-tab').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.filter;
    renderGrid(allApps);
  });
});

fetch('./apps.json').then(r=>r.json()).then(apps=>{
  allApps = apps;
  renderGrid(apps);
  // Stats
  const platforms = new Set(apps.map(a=>a.platform==='both'?['android','ios']:[a.platform]).flat());
  const svcCount = new Set(apps.flatMap(a=>Object.entries(a.services||{}).filter(([,v])=>v).map(([k])=>k))).size;
  document.getElementById('stat-apps').textContent = apps.length;
  document.getElementById('stat-plat').textContent = platforms.size;
  document.getElementById('stat-svc').textContent = svcCount;
}).catch(()=>{
  document.getElementById('grid').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>Yüklenemedi.</p></div>';
});
</script>
</body>
</html>
