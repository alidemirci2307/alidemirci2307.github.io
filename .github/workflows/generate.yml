name: Gizlilik Sayfalarını Oluştur

on:
  push:
    branches: [main]
    paths:
      - 'apps.json'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sayfaları oluştur
        run: node scripts/generate.js

      - name: Değişiklikleri commit et
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: gizlilik sayfaları güncellendi [skip ci]"
          git push
