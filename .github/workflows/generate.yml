name: Gizlilik Sayfalarını Oluştur

on:
  push:
    branches: [main]
    paths:
      - 'apps.json'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sayfaları oluştur
        run: node scripts/generate.js

      - name: Değişiklikleri commit et ve push'la
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "Değişiklik yok, atlanıyor."
          else
            git commit -m "chore: gizlilik sayfaları güncellendi [skip ci]"
            git push origin HEAD:main
          fi
